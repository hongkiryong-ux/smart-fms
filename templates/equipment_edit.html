{% extends "base.html" %}
{% block title %}{{ eq.name }} 수정{% endblock %}
{% block content %}
<header class="page-header">
  <h1>설비 수정</h1>
  <p><code>{{ eq.code }}</code> · {{ eq.category }}</p>
</header>

<section class="card equipment-form-card" style="max-width:640px">
  <form method="post" action="/admin/equipment/{{ eq.id }}/edit" class="form-stack">
    <label>시트(구분)</label>
    <input type="text" name="category" value="{{ eq.category }}" readonly class="readonly-input" />
    <label>구역</label>
    <select name="zone_id" required>
      {% for z in zones %}
      <option value="{{ z.id }}" {% if z.id == eq.zone_id %}selected{% endif %}>{{ z.name }}</option>
      {% endfor %}
    </select>
    <label>코드</label>
    <input type="text" name="code" value="{{ eq.code }}" required />
    <label>상태</label>
    <select name="status">
      {% for s in ['normal', 'warning', 'error'] %}
      <option value="{{ s }}" {% if eq.status == s %}selected{% endif %}>{{ s }}</option>
      {% endfor %}
    </select>

    {% include "partials/equipment_sheet_form.html" %}

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">저장</button>
      <a class="btn btn-secondary" href="/admin/equipment/{{ eq.id }}">취소</a>
    </div>
  </form>
</section>
{% endblock %}
