services:
  - type: web
    name: smart-fms
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: RENDER
        value: "true"
      - key: COOKIE_HTTPS_ONLY
        value: "true"
      - key: APP_SECRET_KEY
        generateValue: true
      - key: ADMIN_ID
        value: admin
      - key: ADMIN_PW
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: smart-fms-db
          property: connectionString

databases:
  - name: smart-fms-db
    plan: starter
    databaseName: smart_fms
    user: smart_fms
